name: Update Writer Directory

on:
  schedule:
    - cron: '0 8 * * 0'  # every Sunday at 8AM UTC (1 hour after digest runs)
  workflow_dispatch:       # manual trigger

jobs:
  update-directory:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth requests feedparser

      - name: Write credentials file
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json

      - name: Copy banner image
        run: echo "Banner should be committed to repo separately"

      - name: Run directory generator
        run: python generate_directory.py

      - name: Commit and push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Update directory $(date +'%Y-%m-%d')"
          git push
